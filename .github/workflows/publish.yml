on:
  push:
    tags:
      - "v*"
  workflow_dispatch: 

jobs:
  publish:
    name: Publish Zed Extension
    runs-on: ubuntu-latest
    steps:
      - uses: huacnlee/zed-extension-action@v2
        with:
          extension-name: atlassian-rovo-mcp-server
          push-to: mgoodness/zed-extensions
          tag: v0.1.0
        env:
          COMMITTER_TOKEN: ${{ secrets.ZED_EXTENSIONS_TOKEN }}
